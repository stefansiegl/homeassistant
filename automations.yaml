        title: "\U0001F9FC Wartung fällig"
        message: Bitte die Befeuchter reinigen.
        data:
          actions:
          - action: MARK_HUMIDIFIER_CLEANED
            title: Befeuchter erledigt ✅
  - if:
    - condition: template
      value_template: '{% set limit = states(''input_number.intervall_luefterfilter_reinigung'')
        | int(180) %} {% set letzte = as_timestamp(states(''input_datetime.letzte_wartung_luefterfilter''))
        %} {{ (as_timestamp(now()) - letzte) / 86400 >= limit }}

        '
    then:
    - action: notify.mobile_app_pixel_9_pro
      data:
        title: "\U0001F300 Wartung fällig"
        message: Bitte die Filter der Lüftungsanlage prüfen/reinigen.
        data:
          actions:
          - action: MARK_FAN_FILTER_CLEANED
            title: Filter erledigt ✅
