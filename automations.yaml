- id: system_maintenance_reset_handler
  alias: 'System: Wartung Reset Handler'
  description: Setzt das jeweilige Wartungsdatum auf heute, wenn der Button in der
    Benachrichtigung gedrückt wird.
  triggers:
  - trigger: event
    event_type: mobile_app_notification_action
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.action == ''MARK_HUMIDIFIER_CLEANED''
          }}'
      sequence:
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.letzte_reinigung_befeuchter
        data:
          date: '{{ now().strftime(''%Y-%m-%d'') }}'
      - action: notify.mobile_app_pixel_9_pro
        data:
          message: Check! Die Reinigung der Befeuchter wurde vermerkt.
    - conditions:
      - condition: template
        value_template: '{{ trigger.event.data.action == ''MARK_FAN_FILTER_CLEANED''
          }}'
      sequence:
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.letzte_wartung_luefterfilter
        data:
          date: '{{ now().strftime(''%Y-%m-%d'') }}'
      - action: notify.mobile_app_pixel_9_pro
        data:
          message: Check! Der Filterwechsel wurde im System gespeichert.
