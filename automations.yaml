- id: ventilation_auto_co2_control
  alias: 'Lüftung: Zentrale Steuerung (Radon & CO2 Mapping)'
  description: Steuert die Helios KWL. Radon-Logik ist optional zuschaltbar.
  triggers:
  - entity_id: sensor.house_max_co2
    trigger: state
  - entity_id: sensor.radon_meter_radon
    trigger: state
  - entity_id: input_boolean.ventilation_kill_switch
    trigger: state
  - entity_id: input_number.radon_threshold_helper
    trigger: state
  - entity_id: input_boolean.radon_logic_enabled
    trigger: state
  - event: start
    trigger: homeassistant
  actions:
  - if:
    - condition: template
      value_template: '{{ trigger.platform == ''homeassistant'' }}'
    then:
    - delay: 01:00:00
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.ventilation_kill_switch
        state: 'on'
      sequence:
      - target:
          entity_id: fan.helios
        data:
          percentage: 0
        action: fan.set_percentage
    - conditions:
      - condition: state
        entity_id: input_boolean.ventilation_kill_switch
        state: 'off'
      sequence:
      - choose:
        - conditions:
          - condition: state
            entity_id: input_boolean.radon_logic_enabled
            state: 'on'
          - condition: numeric_state
            entity_id: sensor.radon_meter_radon
            above: 110
          sequence:
          - target:
              entity_id: fan.helios
            data:
              percentage: 100
            action: fan.set_percentage
        - conditions:
          - condition: state
            entity_id: input_boolean.radon_logic_enabled
            state: 'on'
          - condition: numeric_state
            entity_id: sensor.radon_meter_radon
            above: input_number.radon_threshold_helper
          sequence:
          - target:
              entity_id: fan.helios
            data:
              percentage: 75
            action: fan.set_percentage
        - conditions:
          - condition: numeric_state
            entity_id: sensor.house_max_co2
            above: 1100
          sequence:
          - target:
              entity_id: fan.helios
            data:
              percentage: 50
            action: fan.set_percentage
        - conditions:
          - condition: numeric_state
            entity_id: sensor.house_max_co2
            above: 800
          sequence:
          - target:
              entity_id: fan.helios
            data:
              percentage: 10
            action: fan.set_percentage
        default:
        - target:
            entity_id: fan.helios
          data:
            percentage: 0
          action: fan.set_percentage
  mode: restart
- &id001
  id: climate_humidification_delta_v2_2
  alias: 'Klima: Intelligente Befeuchtung (Delta-Steuerung)'
  description: Regelt 3 Befeuchter. Nachtruhe 22-08 Uhr. Buzzer via Switch-Alarm deaktiviert.
  triggers:
  - trigger: time_pattern
    minutes: /30
  - trigger: state
    entity_id: input_number.ziel_luftfeuchtigkeit
  - trigger: state
    entity_id: input_boolean.ventilation_kill_switch
  actions:
  - variables:
      ziel: '{{ states(''input_number.ziel_luftfeuchtigkeit'') | float(41) }}'
      hum_eg: '{{ states(''sensor.aranet4_02_kueche_humidity'') | float(100) }}'
      hum_1og: '{{ states(''sensor.c9_46_fc_e8_90_d9_humidity'') | float(100) }}'
      hum_2og: '{{ states(''sensor.aranet4_01_arbeitszimmer_humidity'') | float(100)
        }}'
      delta_eg: '{{ ziel - hum_eg }}'
      delta_1og: '{{ ziel - hum_1og }}'
      delta_2og: '{{ ziel - hum_2og }}'
  - if:
    - or:
      - condition: state
        entity_id: input_boolean.ventilation_kill_switch
        state: 'on'
      - condition: time
        after: '22:00:00'
        before: 08:00:00
    then:
    - action: humidifier.turn_off
      target:
        entity_id:
        - humidifier.deerma_jsq2w_a365_humidifier
        - humidifier.deerma_jsq2w_7134_humidifier
        - humidifier.deerma_jsq2w_b6e0_humidifier
    - stop: Nachtruhe oder Kill-Switch aktiv
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ delta_eg > 0 }}'
      sequence:
      - action: switch.turn_off
        target:
          entity_id: switch.deerma_jsq2w_a365_alarm
      - action: humidifier.turn_on
        target:
          entity_id: humidifier.deerma_jsq2w_a365_humidifier
      - action: humidifier.set_mode
        target:
          entity_id: humidifier.deerma_jsq2w_a365_humidifier
        data:
          mode: '{% if delta_eg > 10 %} High {% elif delta_eg > 5 %} Medium {% else
            %} Low {% endif %}

            '
    default:
    - action: humidifier.turn_off
      target:
        entity_id: humidifier.deerma_jsq2w_a365_humidifier
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ delta_1og > 0 }}'
      sequence:
      - action: switch.turn_off
        target:
          entity_id: switch.deerma_jsq2w_7134_alarm
      - action: humidifier.turn_on
        target:
          entity_id: humidifier.deerma_jsq2w_7134_humidifier
      - action: humidifier.set_mode
        target:
          entity_id: humidifier.deerma_jsq2w_7134_humidifier
        data:
          mode: '{% if delta_1og > 10 %} High {% elif delta_1og > 5 %} Medium {% else
            %} Low {% endif %}

            '
    default:
    - action: humidifier.turn_off
      target:
        entity_id: humidifier.deerma_jsq2w_7134_humidifier
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ delta_2og > 0 }}'
      sequence:
      - action: switch.turn_off
        target:
          entity_id: switch.deerma_jsq2w_b6e0_alarm
      - action: humidifier.turn_on
        target:
          entity_id: humidifier.deerma_jsq2w_b6e0_humidifier
      - action: humidifier.set_mode
        target:
          entity_id: humidifier.deerma_jsq2w_b6e0_humidifier
        data:
          mode: '{% if delta_2og > 5 %} Medium {% else %} Low {% endif %}

            '
    default:
    - action: humidifier.turn_off
      target:
        entity_id: humidifier.deerma_jsq2w_b6e0_humidifier
  mode: restart
- id: humidifiers_water_shortage_notify
  alias: 'Klima: Warnung Wassertank leer'
  description: Sendet Push-Nachricht, wenn ein Befeuchter Wassermangel meldet.
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.deerma_jsq2w_a365_water_shortage_fault
    - binary_sensor.deerma_jsq2w_7134_water_shortage_fault
    - binary_sensor.deerma_jsq2w_b6e0_water_shortage_fault
    to: 'on'
  actions:
  - action: notify.mobile_app_pixel_9_pro
    data:
      title: "\U0001F4A7 Wassertank leer!"
      message: Der Befeuchter '{{ trigger.to_state.name }}' meldet Wassermangel. Bitte
        nachfüllen.
      data:
        clickAction: /lovelace/klima
  mode: parallel
- id: central_maintenance_system
  alias: Zentrales Wartungs-Management
  description: ''
  triggers:
  - trigger: time
    at: '10:00:00'
  actions:
  - if:
    - condition: template
      value_template: '{% set limit = states(''input_number.intervall_befeuchter_reinigung'')
        | int(60) %} {% set letzte = as_timestamp(states(''input_datetime.letzte_reinigung_befeuchter''))
        %} {{ (as_timestamp(now()) - letzte) / 86400 >= limit }}

        '
