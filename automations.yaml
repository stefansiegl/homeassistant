- id: müll_erinnerung_david
  alias: 'Müll: Benachrichtigung & Nachbar-Option'
  description: Erinnert um 17:30 Uhr per Push und kurzer Sprachansage (deutsch).
  triggers:
  - trigger: time
    at: '17:30:00'
  conditions:
  - condition: template
    value_template: "{{ state_attr('sensor.waste_rest_days', 'daysTo') | int(99) ==
      1 or \n   state_attr('sensor.waste_gelb_days', 'daysTo') | int(99) == 1 or \n
      \  state_attr('sensor.waste_bio_days', 'daysTo') | int(99) == 1 or \n   state_attr('sensor.waste_papier_days',
      'daysTo') | int(99) == 1 }}\n"
  actions:
  - variables:
      tonnen_liste: '{% set t = [] %}

        {% if state_attr(''sensor.waste_rest_days'', ''daysTo'') | int(99) == 1 %}{%
        set t = t + [''Restmüll''] %}{% endif %}

        {% if state_attr(''sensor.waste_gelb_days'', ''daysTo'') | int(99) == 1 %}{%
        set t = t + [''Gelbe Tonne''] %}{% endif %}

        {% if state_attr(''sensor.waste_bio_days'', ''daysTo'') | int(99) == 1 %}{%
        set t = t + [''Biomüll''] %}{% endif %}

        {% if state_attr(''sensor.waste_papier_days'', ''daysTo'') | int(99) == 1
        %}{% set t = t + [''Altpapier''] %}{% endif %}

        {{ t | join('' und '') }}

        '
  - action: media_player.volume_set
    target:
      entity_id: media_player.benachrichtung_lautsprecher
    data:
      volume_level: 0.4
  - action: tts.google_translate_say
    target:
      entity_id: media_player.benachrichtung_lautsprecher
    data:
      message: 'Morgen: {{ tonnen_liste }}.'
      language: de
  - action: notify.mobile_app_pixel_9_pro
    data:
      title: "\U0001F69B {{ tonnen_liste }} morgen fällig!"
      message: Klick für Nachbar-Option.
      data:
        actions:
        - action: URI
          title: David via Threema fragen
          uri: '{% set nachricht = "Hallo David! Kannst du morgen bitte " + tonnen_liste
            + " rausstellen? Danke!" %} threema://compose?id=THREEMA_ID_VON_DAVID&text={{
            nachricht | urlencode }}

            '
  mode: single
- id: waschmaschine_status_mgmt
  alias: 'Haushalt: Waschmaschine Status-Management'
  description: 'V9: Robust gegen Neustarts & Waschpausen (5 Min Puffer)'
  triggers:
  - trigger: numeric_state
    entity_id: sensor.shellyplug_6_waschmaschine_power
    above: 10
    for: 00:01:00
    id: trigger_start
  - trigger: numeric_state
    entity_id: sensor.shellyplug_6_waschmaschine_power
    below: 4
    for: 00:05:00
    id: trigger_fertig
  - trigger: numeric_state
    entity_id: sensor.shellyplug_6_waschmaschine_power
    below: 1.0
    for: 00:10:00
    id: trigger_standby
  - trigger: homeassistant
    event: start
    id: system_start
  actions:
  - if:
    - condition: trigger
      id: system_start
    then:
    - delay: 00:01:00
    - if:
      - condition: template
        value_template: '{{ states(''sensor.shellyplug_6_waschmaschine_power'') |
          float(0) < 1.0 }}'
      then:
      - action: input_select.select_option
        target:
          entity_id: input_select.waschmaschine_status_helper
        data:
          option: standby
    - stop: Systemstart-Check abgeschlossen
  - choose:
    - conditions:
      - condition: trigger
        id: trigger_start
      sequence:
      - action: input_select.select_option
        target:
          entity_id: input_select.waschmaschine_status_helper
        data:
          option: läuft
    - conditions:
      - condition: trigger
        id: trigger_fertig
      - condition: state
        entity_id: input_select.waschmaschine_status_helper
        state: läuft
      sequence:
      - action: input_select.select_option
        target:
          entity_id: input_select.waschmaschine_status_helper
        data:
          option: fertig
    - conditions:
      - condition: trigger
        id: trigger_standby
      sequence:
      - action: input_select.select_option
        target:
          entity_id: input_select.waschmaschine_status_helper
        data:
          option: standby
  mode: restart
- id: waschmaschine_notify
  alias: 'Haushalt: Waschmaschine Benachrichtigung'
  description: Push immer, Sprachausgabe (kurz & deutsch) nur zu kinderfreundlichen
    Zeiten.
  triggers:
  - trigger: state
    entity_id: input_select.waschmaschine_status_helper
    from: läuft
    to: fertig
  actions:
  - action: notify.mobile_app_pixel_9_pro
    data:
      title: "Waschmaschine fertig! \U0001F9FA"
      message: Wäsche entnehmen.
      data:
        push:
          sound: default
          interruption-level: active
  - if:
    - condition: or
      conditions:
      - condition: and
        conditions:
        - condition: time
          after: 08:00:00
          before: '20:30:00'
        - condition: time
          weekday:
          - mon
          - tue
          - wed
          - thu
          - fri
      - condition: and
        conditions:
        - condition: time
          after: 09:30:00
          before: '20:30:00'
        - condition: time
          weekday:
          - sat
          - sun
    then:
    - action: media_player.volume_set
      target:
        entity_id: media_player.benachrichtung_lautsprecher
      data:
        volume_level: 0.4
    - action: tts.google_translate_say
      target:
        entity_id: media_player.benachrichtung_lautsprecher
      data:
        message: Waschmaschine ist fertig.
        language: de
