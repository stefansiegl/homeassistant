- id: '1771604553302'
  alias: 'Licht: Hue Dimmer Switch EG komplett'
  description: Szenen-Zyklus, schnelles Hold-to-Dim (ohne Ausgehen) und Power-Hold
  triggers:
  - domain: mqtt
    device_id: 0457441d0c73d8db61464dce69f22ef2
    type: action
    subtype: on_hold
    id: power_hold
    trigger: device
  - domain: mqtt
    device_id: 0457441d0c73d8db61464dce69f22ef2
    type: action
    subtype: up_press
    id: dim_up
    trigger: device
  - domain: mqtt
    device_id: 0457441d0c73d8db61464dce69f22ef2
    type: action
    subtype: up_hold
    id: dim_up_hold
    trigger: device
  - domain: mqtt
    device_id: 0457441d0c73d8db61464dce69f22ef2
    type: action
    subtype: down_press
    id: dim_down
    trigger: device
  - domain: mqtt
    device_id: 0457441d0c73d8db61464dce69f22ef2
    type: action
    subtype: down_hold
    id: dim_down_hold
    trigger: device
  - domain: mqtt
    device_id: 0457441d0c73d8db61464dce69f22ef2
    type: action
    subtype: up_hold_release
    id: stop_dimming
    trigger: device
  - domain: mqtt
    device_id: 0457441d0c73d8db61464dce69f22ef2
    type: action
    subtype: down_hold_release
    id: stop_dimming
    trigger: device
  - domain: mqtt
    device_id: 0457441d0c73d8db61464dce69f22ef2
    type: action
    subtype: off_press
    id: hue_button
    trigger: device
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: power_hold
      sequence:
      - target:
          entity_id: light.alle_lichter_erdgeschoss
        data:
          transition: 3
        action: light.turn_off
    - conditions:
      - condition: trigger
        id: hue_button
      sequence:
      - target:
          entity_id: input_select.szenen_zyklus_eg
        data:
          cycle: true
        action: input_select.select_next
      - delay:
          milliseconds: 250
      - target:
          entity_id: '{% set szene = states(''input_select.szenen_zyklus_eg'') %}
            {% if szene == ''Hell'' %} scene.hell {% elif szene == ''Gemütlich'' %}
            scene.gemutlich {% elif szene == ''Kino'' %} scene.kino {% elif szene
            == ''Sonnenuntergang'' %} scene.sonnenuntergang {% elif szene == ''Brettspiele''
            %} scene.brettspiele {% else %} scene.gemutlich {% endif %} '
        data:
          transition: '{% set szene = states(''input_select.szenen_zyklus_eg'') %}
            {% if szene in [''Hell'', ''Brettspiele''] %} 5 {% else %} 2 {% endif
            %} '
        action: scene.turn_on
    - conditions:
      - condition: trigger
        id: dim_up
      sequence:
      - target:
          entity_id: '{{ expand(''light.alle_lichter_erdgeschoss'') | selectattr(''state'',
            ''eq'', ''on'') | map(attribute=''entity_id'') | list }} '
        data:
          brightness_step_pct: 15
          transition: 0.3
        action: light.turn_on
    - conditions:
      - condition: trigger
        id: dim_up_hold
      sequence:
      - repeat:
          count: 20
          sequence:
          - target:
              entity_id: '{{ expand(''light.alle_lichter_erdgeschoss'') | selectattr(''state'',
                ''eq'', ''on'') | map(attribute=''entity_id'') | list }} '
            data:
              brightness_step_pct: 15
              transition: 0.3
            action: light.turn_on
          - delay:
              milliseconds: 300
    - conditions:
      - condition: trigger
        id: dim_down
      sequence:
      - target:
          entity_id: '{{ expand(''light.alle_lichter_erdgeschoss'') | selectattr(''state'',
            ''eq'', ''on'') | selectattr(''attributes.brightness'', ''defined'') |
            selectattr(''attributes.brightness'', ''>'', 38) | map(attribute=''entity_id'')
            | list }} '
        data:
          brightness_step_pct: -15
          transition: 0.3
        action: light.turn_on
    - conditions:
      - condition: trigger
        id: dim_down_hold
      sequence:
      - repeat:
          count: 20
          sequence:
          - target:
              entity_id: '{{ expand(''light.alle_lichter_erdgeschoss'') | selectattr(''state'',
                ''eq'', ''on'') | selectattr(''attributes.brightness'', ''defined'')
                | selectattr(''attributes.brightness'', ''>'', 38) | map(attribute=''entity_id'')
                | list }} '
            data:
              brightness_step_pct: -15
              transition: 0.3
            action: light.turn_on
          - delay:
              milliseconds: 300
    - conditions:
      - condition: trigger
        id: stop_dimming
      sequence:
      - delay:
          milliseconds: 10
  mode: restart
