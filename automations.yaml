- id: '1770730888979'
  alias: 'Haushalt: Spülmaschine Benachrichtigung'
  description: Push immer, Sprachausgabe (kurz & deutsch) nur zu kinderfreundlichen
    Zeiten.
  triggers:
  - trigger: state
    entity_id: input_select.spuelmaschine_status_helper
    from: läuft
    to: fertig
  actions:
  - action: notify.mobile_app_pixel_9_pro
    data:
      title: "Spülmaschine fertig! \U0001F37D️"
      message: Geschirr sauber.
      data:
        push:
          sound: default
          interruption-level: active
  - if:
    - condition: or
      conditions:
      - condition: and
        conditions:
        - condition: time
          after: 08:00:00
          before: '20:30:00'
        - condition: time
          weekday:
          - mon
          - tue
          - wed
          - thu
          - fri
      - condition: and
        conditions:
        - condition: time
          after: 09:30:00
          before: '20:30:00'
        - condition: time
          weekday:
          - sat
          - sun
    then:
    - action: media_player.volume_set
      target:
        entity_id: media_player.benachrichtung_lautsprecher
      data:
        volume_level: 0.4
    - action: tts.google_translate_say
      target:
        entity_id: media_player.benachrichtung_lautsprecher
      data:
        message: Geschirr ist fertig.
        language: de
- id: '1770731967147'
  alias: 'Sicherheit: Radon Alarm (Kritisch)'
  description: Warnt wiederkehrend bei Radon-Gefahr, bis aktiv am Handy bestätigt
    wird.
  triggers:
  - trigger: numeric_state
    entity_id: sensor.airthings_wave2_181676_radon_1_tages_wert
    above: input_number.radon_threshold_helper
    id: Kueche
  - trigger: numeric_state
    entity_id: sensor.radon_meter_radon
    above: input_number.radon_threshold_helper
    id: Keller
  actions:
  - alias: Benachrichtigungs-Schleife bis Bestätigung
    repeat:
      sequence:
      - action: notify.mobile_app_pixel_9_pro
        data:
          title: '☢️ RADON ALARM: {{ trigger.id }}'
          message: 'Der Radon-Wert in {{ trigger.id }} ist kritisch! Aktuell: {{ states(trigger.entity_id)
            }} Bq/m³. (Grenzwert: {{ states(''input_number.radon_threshold_helper'')
            }} Bq/m³) Bitte lüften!'
          data:
            ttl: 0
            priority: high
            actions:
            - action: RADON_CONFIRM
              title: Verstanden - Alarm aus
      - alias: Warte auf Bestätigung oder Timeout (60 Min)
        wait_for_trigger:
        - trigger: event
          event_type: mobile_app_notification_action
          event_data:
            action: RADON_CONFIRM
        timeout: 01:00:00
      until:
      - condition: template
        value_template: '{{ wait.trigger is defined }}'
  mode: parallel
  max: 2
