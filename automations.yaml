- id: '1770908410686'
  alias: 'David: Kombinierte Steuerung'
  description: Zentralisierte Steuerung für Licht (Toggle, Dimmen, Szenen) mit simuliertem
    Doppelklick
  triggers:
  - trigger: device
    domain: mqtt
    device_id: eb9176b54c72cdc77763504806f72acd
    type: action
    subtype: left_press
    id: press_eval_gross
  - trigger: device
    domain: mqtt
    device_id: eb9176b54c72cdc77763504806f72acd
    type: action
    subtype: left_hold
    id: dim
  - trigger: device
    domain: mqtt
    device_id: 2e0440a811764f5a442354a22f8191f5
    type: action
    subtype: press
    id: press_eval_klein
  - trigger: device
    domain: mqtt
    device_id: 2e0440a811764f5a442354a22f8191f5
    type: action
    subtype: hold
    id: dim
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: press_eval_gross
      sequence:
      - wait_for_trigger:
        - trigger: device
          domain: mqtt
          device_id: eb9176b54c72cdc77763504806f72acd
          type: action
          subtype: left_press
        timeout:
          milliseconds: 500
      - if:
        - condition: template
          value_template: '{{ wait.trigger is not none }}'
        then:
        - if:
          - condition: numeric_state
            entity_id: light.licht_1og_david
            attribute: brightness
            above: 200
          then:
          - action: scene.turn_on
            target:
              entity_id: scene.david_gemutlich
          else:
          - action: scene.turn_on
            target:
              entity_id: scene.david_hell
        else:
        - action: light.toggle
          target:
            entity_id: light.licht_1og_david
    - conditions:
      - condition: trigger
        id: press_eval_klein
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.licht_1og_david
        data:
          brightness_pct: 90
    - conditions:
      - condition: trigger
        id: dim
      sequence:
      - repeat:
          sequence:
          - action: light.turn_on
            target:
              entity_id: light.licht_1og_david
            data:
              brightness_step_pct: '{{ 10 if (repeat.index % 20) < 10 else -10 }}'
          - wait_for_trigger:
            - trigger: device
              domain: mqtt
              device_id: eb9176b54c72cdc77763504806f72acd
              type: action
              subtype: left_hold_release
            - trigger: device
              domain: mqtt
              device_id: 2e0440a811764f5a442354a22f8191f5
              type: action
              subtype: release
            timeout:
              milliseconds: 400
          until:
          - condition: template
            value_template: '{{ wait.trigger is not none }}'
  mode: single
